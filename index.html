<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>
<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.top-bar {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
}

input { padding: 5px; min-width: 100px; }
button { padding: 5px 10px; }

#hall-container {
    width: 100%;
    overflow-x: auto; /* przewijanie poziome na telefonach */
    display: flex;
    justify-content: center;
}

#hall {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0 5px; /* marginesy boczne */
    min-width: 700px; /* minimalna szerokość sali, żeby miejsca nie były skompresowane */
}

.row {
    display: flex;
    justify-content: center;
    margin: 5px 0;
    flex-wrap: nowrap; /* rzędy nie łamią się */
}

.seat {
    width: 38px;  
    height: 38px;
    margin: 3px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
}

.selected { background-color: orange; }
.occupied { background-color: gray; cursor: not-allowed; }
.highlight { outline: 3px solid yellow; }

.gap { width: 20px; }
.big-gap { height: 30px; }

.stage {
    width: 100%;
    max-width: calc((22-6+1)*44px);
    height: 40px;
    background-color: #d2a679;
    margin-bottom: 15px;
}

#selectedCount { margin-top: 10px; font-weight: bold; }

#reserveBtn {
    margin: 20px 0;
    padding: 15px 30px;
    font-size: 18px;
    cursor: pointer;
}

/* Modal */
#modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 100;
}

#modalContent {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

#modalContent input { width: 100%; padding: 10px; font-size: 16px; }
#modalContent button { padding: 10px; font-size: 16px; cursor: pointer; }

/* Responsywność */
@media(max-width: 768px){
    .seat { width: 32px; height: 32px; font-size:12px; }
}

@media(max-width: 480px){
    .seat { width: 28px; height: 28px; font-size:10px; }
}
</style>
</head>
<body>

<div class="top-bar">
    🔍 <input type="text" id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<div class="stage"></div>

<!-- kontener przewijalny -->
<div id="hall-container">
    <div id="hall"></div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>
<button id="reserveBtn">ZAREZERWUJ</button>

<!-- Modal -->
<div id="modal">
    <div id="modalContent">
        <h3>Wpisz imię i nazwisko</h3>
        <input type="text" id="modalName" placeholder="Imię i nazwisko">
        <div style="display:flex; justify-content:space-between;">
            <button id="cancelModal">ANULUJ</button>
            <button id="saveModal">ZAPISZ</button>
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjbfpcrG8jWUKsuRNmG21UpyQY17UxJos",
  authDomain: "bilet-eeb4b.firebaseapp.com",
  projectId: "bilet-eeb4b",
  storageBucket: "bilet-eeb4b.appspot.com",
  messagingSenderId: "115960304761",
  appId: "1:115960304761:web:4ef47bb6a6e151a817b0a8",
  measurementId: "G-JD7W37ZHN2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const hall = document.getElementById("hall");
const selectedCountDiv = document.getElementById("selectedCount");
let selectedSeats = [];
let dragSelecting = false;
const nicknames = {"bartek":"Bartosz","jarek":"Jarosław","kuba":"Jakub","ola":"Aleksandra","ania":"Anna"};

document.addEventListener("mouseup",()=>dragSelecting=false);

function updateSelectedCount(){ selectedCountDiv.innerText=`Wybrane miejsca: ${selectedSeats.length}`; }

// Tworzenie sali
for(let row=1;row<=20;row++){
    const rowDiv=document.createElement("div");
    rowDiv.classList.add("row");
    let seats=28;if(row===1) seats=26;if(row===20) seats=14;
    for(let i=1;i<=seats;i++){
        if(row!==20){
            if(row===1){ if(i===7||i===21){ const gap=document.createElement("div"); gap.classList.add("gap"); rowDiv.appendChild(gap); } }
            else{ if(i===8||i===22){ const gap=document.createElement("div"); gap.classList.add("gap"); rowDiv.appendChild(gap); } }
        }
        const seatId=`R${row}M${i}`;
        const btn=document.createElement("button");
        btn.classList.add("seat"); btn.id=seatId; btn.innerText=i;
        btn.addEventListener("mousedown",()=>{ dragSelecting=true; handleSeatClick(btn,seatId); });
        btn.addEventListener("mouseenter",()=>{ if(dragSelecting) handleSeatClick(btn,seatId,true); });
        rowDiv.appendChild(btn);
    }
    hall.appendChild(rowDiv);
    if(row===10){ const gapRow=document.createElement("div"); gapRow.classList.add("big-gap"); hall.appendChild(gapRow);}
}

// Funkcja kliknięcia w miejsce
function handleSeatClick(btn,seatId,isDrag=false){
    if(btn.classList.contains("occupied")){
        const name=btn.dataset.name;
        if(!isDrag && confirm(`Zajęte przez: ${name}\nUsunąć rezerwację?`)){
            db.collection("seats").doc(seatId).delete();
        }
        return;
    }
    btn.classList.toggle("selected");
    if(selectedSeats.includes(seatId)) selectedSeats=selectedSeats.filter(s=>s!==seatId);
    else selectedSeats.push(seatId);
    updateSelectedCount();
}

// Realtime update
db.collection("seats").onSnapshot(snapshot=>{
    snapshot.docChanges().forEach(change=>{
        const id=change.doc.id;
        const btn=document.getElementById(id);
        if(!btn) return;
        if(change.type==="added"||change.type==="modified"){
            btn.classList.add("occupied");
            btn.dataset.name=change.doc.data().name;
            btn.classList.remove("selected");
            selectedSeats=selectedSeats.filter(s=>s!==id);
            updateSelectedCount();
        }
        if(change.type==="removed"){
            btn.classList.remove("occupied");
            delete btn.dataset.name;
        }
    });
});

// Modal logic
const reserveBtn=document.getElementById("reserveBtn");
const modal=document.getElementById("modal");
const modalName=document.getElementById("modalName");
const cancelModal=document.getElementById("cancelModal");
const saveModal=document.getElementById("saveModal");

reserveBtn.addEventListener("click",()=>{
    if(selectedSeats.length===0){ alert("Wybierz przynajmniej jedno miejsce."); return;}
    modal.style.display="flex"; modalName.value=""; modalName.focus();
});
cancelModal.addEventListener("click",()=>{ modal.style.display="none"; });

saveModal.addEventListener("click",()=>{
    const name=modalName.value.trim();
    if(!name){ alert("Wpisz imię i nazwisko."); return; }
    selectedSeats.forEach(seatId=>{
        db.collection("seats").doc(seatId).set({name});
    });
    selectedSeats=[]; updateSelectedCount(); modal.style.display="none";
});

// Wyszukiwarka
function searchPerson(){
    let search=document.getElementById("search").value.toLowerCase();
    if(nicknames[search]) search=nicknames[search].toLowerCase();
    document.querySelectorAll(".seat").forEach(btn=>{
        btn.classList.remove("highlight");
        if(btn.dataset.name && btn.dataset.name.toLowerCase().includes(search)) btn.classList.add("highlight");
    });
}
</script>
</body>
</html>
