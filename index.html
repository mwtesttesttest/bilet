<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.top-bar {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
}

input { padding: 5px; min-width: 100px; }
button { padding: 5px 10px; cursor: pointer; }

#hall-container {
    width: 100%;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
}

#hall {
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: top center;
}

.row {
    display: flex;
    justify-content: center;
    margin: 5px 0;
    flex-wrap: nowrap;
}

.seat {
    width: 35px;
    height: 35px;
    margin: 3px;
    background-color: green;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 12px;
    transition: 0.2s;
}

.selected { background-color: orange; }
.occupied { background-color: gray; cursor: not-allowed; }
.highlight { outline: 3px solid yellow; }

.gap { width: 15px; }
.big-gap { height: 25px; }

.stage {
    position: relative;
    width: calc((22 - 6 + 1) * 39px);
    height: 30px;
    background-color: #d2a679;
    margin-bottom: 15px;
}

#selectedCount { margin-top: 10px; font-weight: bold; }

#reserveBtn {
    margin: 20px 0;
    padding: 12px 25px;
    font-size: 16px;
    cursor: pointer;
}

/* Modal */
#modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 100;
}

#modalContent {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

#modalContent input { width: 100%; padding: 10px; font-size: 16px; }
#modalContent button { padding: 10px; font-size: 16px; cursor: pointer; }

</style>
</head>

<body>

<div class="top-bar">
    🔍 <input type="text" id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<div class="stage"></div>

<div id="hall-container">
    <div id="hall"></div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>

<button id="reserveBtn">ZAREZERWUJ</button>

<!-- Modal -->
<div id="modal">
    <div id="modalContent">
        <h3>Wpisz imię i nazwisko</h3>
        <input type="text" id="modalName" placeholder="Imię i nazwisko">
        <div style="display:flex; justify-content: space-between;">
            <button id="cancelModal">ANULUJ</button>
            <button id="saveModal">ZAPISZ</button>
        </div>
    </div>
</div>

<script>
const hall = document.getElementById("hall");
const selectedCountDiv = document.getElementById("selectedCount");
let selectedSeats = [];
let occupiedSeats = ["R1M1","R1M2","R3M5"];
const nicknames = {"bartek":"Bartosz","jarek":"Jarosław","kuba":"Jakub","ola":"Aleksandra","ania":"Anna"};
let dragSelecting = false;

document.addEventListener("mouseup", () => dragSelecting = false);

function updateSelectedCount(){
    selectedCountDiv.innerText = `Wybrane miejsca: ${selectedSeats.length}`;
}

// Tworzenie sali
for (let row=1; row<=20; row++){
    const rowDiv = document.createElement("div");
    rowDiv.classList.add("row");

    let seats = 28;
    if(row===1) seats=26;
    if(row===20) seats=14;

    for(let i=1; i<=seats; i++){
        if(row!==20){
            if(row===1){
                if(i===7 || i===21){
                    const gap=document.createElement("div");
                    gap.classList.add("gap");
                    rowDiv.appendChild(gap);
                }
            } else {
                if(i===8 || i===22){
                    const gap=document.createElement("div");
                    gap.classList.add("gap");
                    rowDiv.appendChild(gap);
                }
            }
        }

        const seatId = `R${row}M${i}`;
        const btn=document.createElement("button");
        btn.classList.add("seat");
        btn.id=seatId;
        btn.innerText=i;

        if(occupiedSeats.includes(seatId)){
            btn.classList.add("occupied");
            btn.dataset.name="Jan Kowalski";
        }

        btn.addEventListener("mousedown", () => {
            dragSelecting=true;
            handleSeatClick(btn, seatId);
        });

        btn.addEventListener("mouseenter", () => {
            if(dragSelecting) handleSeatClick(btn, seatId, true);
        });

        rowDiv.appendChild(btn);
    }

    hall.appendChild(rowDiv);

    if(row===10){
        const gapRow = document.createElement("div");
        gapRow.classList.add("big-gap");
        hall.appendChild(gapRow);
    }
}

function handleSeatClick(btn, seatId, isDrag=false){
    if(btn.classList.contains("occupied")){
        const name=btn.dataset.name;
        if(!isDrag && confirm(`Zajęte przez: ${name}\nUsunąć rezerwację?`)){
            btn.classList.remove("occupied");
            delete btn.dataset.name;
        }
        return;
    }

    btn.classList.toggle("selected");

    if(selectedSeats.includes(seatId)){
        selectedSeats = selectedSeats.filter(s=>s!==seatId);
    } else {
        selectedSeats.push(seatId);
    }

    updateSelectedCount();
}

// Modal
const reserveBtn = document.getElementById("reserveBtn");
const modal = document.getElementById("modal");
const modalName = document.getElementById("modalName");
const cancelModal = document.getElementById("cancelModal");
const saveModal = document.getElementById("saveModal");

reserveBtn.addEventListener("click", () => {
    if(selectedSeats.length === 0){
        alert("Wybierz przynajmniej jedno miejsce.");
        return;
    }
    modal.style.display = "flex";
    modalName.value = "";
    modalName.focus();
});

cancelModal.addEventListener("click", () => {
    modal.style.display = "none";
});

saveModal.addEventListener("click", () => {
    const name = modalName.value.trim();
    if(!name){
        alert("Wpisz imię i nazwisko.");
        return;
    }

    selectedSeats.forEach(seatId=>{
        const btn=document.getElementById(seatId);
        btn.classList.remove("selected");
        btn.classList.add("occupied");
        btn.dataset.name=name;
    });

    selectedSeats=[];
    updateSelectedCount();
    modal.style.display="none";
});

// Wyszukiwarka
function searchPerson(){
    let search=document.getElementById("search").value.toLowerCase();
    if(nicknames[search]) search=nicknames[search].toLowerCase();

    document.querySelectorAll(".seat").forEach(btn=>{
        btn.classList.remove("highlight");
        if(btn.dataset.name && btn.dataset.name.toLowerCase().includes(search)){
            btn.classList.add("highlight");
        }
    });
}

// 🔥 FINAL: skalowanie + idealne centrowanie
function scaleHall() {
    const hall = document.getElementById("hall");
    const container = document.getElementById("hall-container");

    hall.style.transform = "scale(1)";
    hall.style.width = "auto";

    const hallWidth = hall.scrollWidth;
    const screenWidth = container.clientWidth;

    let scale = screenWidth / hallWidth;
    if (scale > 1) scale = 1;

    const finalWidth = hallWidth * scale;

    hall.style.transform = `scale(${scale})`;
    hall.style.width = finalWidth + "px";

    // 🔥 centrowanie
    hall.style.marginLeft = ((screenWidth - finalWidth) / 2) + "px";
}

window.addEventListener("load", scaleHall);
window.addEventListener("resize", scaleHall);

</script>

</body>
</html>
