<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sala rezerwacji PRO</title>

<style>
body { font-family: Arial; text-align: center; }

.stage {
    width: 80%;
    height: 60px;
    background-color: #d2a679;
    margin: 20px auto;
    line-height: 60px;
    font-weight: bold;
}

.top-bar {
    margin: 10px;
}

input {
    padding: 5px;
}

.row {
    display: flex;
    justify-content: center;
    margin: 5px 0;
}

.row.first-row {
    transform: translateX(-15px);
}

.seat {
    width: 25px;
    height: 25px;
    margin: 3px;
    background-color: green;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 10px;
}

.selected {
    background-color: orange;
}

.occupied {
    background-color: gray;
}

.highlight {
    outline: 3px solid yellow;
}

.gap { width: 20px; }
.big-gap { height: 30px; }

</style>
</head>
<body>

<div class="top-bar">
    🔍 <input type="text" id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<div class="stage">SCENA</div>

<div id="hall"></div>

<div>
    <input type="text" id="name" placeholder="Imię i nazwisko">
    <button onclick="reserveSeats()">Zarezerwuj zaznaczone</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjbfpcrG8jWUKsuRNmG21UpyQY17UxJos",
  authDomain: "bilet-eeb4b.firebaseapp.com",
  projectId: "bilet-eeb4b",
  storageBucket: "bilet-eeb4b.firebasestorage.app",
  messagingSenderId: "115960304761",
  appId: "1:115960304761:web:4ef47bb6a6e151a817b0a8",
  measurementId: "G-JD7W37ZHN2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const hall = document.getElementById("hall");

let selectedSeats = [];

// tworzenie sali
for (let row = 1; row <= 20; row++) {

    const rowDiv = document.createElement("div");
    rowDiv.classList.add("row");

    if (row === 1) rowDiv.classList.add("first-row");

    let seats = 28;
    if (row === 1) seats = 26;
    if (row === 20) seats = 14;

    for (let i = 1; i <= seats; i++) {

        if (i === 8 || i === 22) {
            const gap = document.createElement("div");
            gap.classList.add("gap");
            rowDiv.appendChild(gap);
        }

        const seatId = `R${row}M${i}`;

        const btn = document.createElement("button");
        btn.classList.add("seat");
        btn.innerText = i;
        btn.id = seatId;

        btn.onclick = () => handleSeatClick(btn, seatId);

        rowDiv.appendChild(btn);
    }

    hall.appendChild(rowDiv);

    if (row === 10) {
        const gapRow = document.createElement("div");
        gapRow.classList.add("big-gap");
        hall.appendChild(gapRow);
    }
}

// realtime update
db.collection("seats").onSnapshot(snapshot => {
    snapshot.docChanges().forEach(change => {
        const id = change.doc.id;
        const btn = document.getElementById(id);

        if (!btn) return;

        if (change.type === "added" || change.type === "modified") {
            btn.classList.add("occupied");
            btn.dataset.name = change.doc.data().name;
        }

        if (change.type === "removed") {
            btn.classList.remove("occupied");
            delete btn.dataset.name;
        }
    });
});

// klik
function handleSeatClick(btn, seatId) {

    if (btn.classList.contains("occupied")) {
        const name = btn.dataset.name;

        if (confirm(`Zajęte przez: ${name}\nUsunąć rezerwację?`)) {
            db.collection("seats").doc(seatId).delete();
        }
        return;
    }

    btn.classList.toggle("selected");

    if (selectedSeats.includes(seatId)) {
        selectedSeats = selectedSeats.filter(s => s !== seatId);
    } else {
        selectedSeats.push(seatId);
    }
}

// rezerwacja wielu
function reserveSeats() {
    const name = document.getElementById("name").value;

    if (!name || selectedSeats.length === 0) {
        alert("Wpisz dane i wybierz miejsca");
        return;
    }

    selectedSeats.forEach(seatId => {
        db.collection("seats").doc(seatId).set({ name });
    });

    selectedSeats = [];
}

// wyszukiwarka
function searchPerson() {
    const search = document.getElementById("search").value.toLowerCase();

    document.querySelectorAll(".seat").forEach(btn => {
        btn.classList.remove("highlight");

        if (btn.dataset.name && btn.dataset.name.toLowerCase().includes(search)) {
            btn.classList.add("highlight");
        }
    });
}
</script>

</body>
</html>
