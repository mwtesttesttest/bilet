<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sala rezerwacji</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
    }

    .stage {
        width: 80%;
        height: 60px;
        background-color: #d2a679;
        margin: 20px auto;
        line-height: 60px;
        font-weight: bold;
    }

    .row {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 5px 0;
    }

    .row-label {
        width: 30px;
        text-align: right;
        margin-right: 10px;
        font-weight: bold;
    }

    .seat {
        width: 25px;
        height: 25px;
        margin: 3px;
        background-color: green;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 10px;
    }

    .occupied {
        background-color: gray;
    }

    .gap {
        width: 20px;
    }

    .big-gap {
        height: 30px;
    }

    #form {
        margin-top: 20px;
        display: none;
    }
</style>
</head>
<body>

<div class="stage">SCENA</div>

<div id="hall"></div>

<div id="form">
    <h3>Rezerwacja miejsca</h3>
    <input type="text" id="name" placeholder="Imię i nazwisko">
    <button onclick="reserveSeat()">Zarezerwuj</button>
</div>

<script>
const hall = document.getElementById("hall");
const form = document.getElementById("form");
const nameInput = document.getElementById("name");

let selectedSeat = null;

const totalRows = 20;

for (let row = 1; row <= totalRows; row++) {

    const rowDiv = document.createElement("div");
    rowDiv.classList.add("row");

    // numer rzędu
    const label = document.createElement("div");
    label.classList.add("row-label");
    label.innerText = row;
    rowDiv.appendChild(label);

    let seats = 28;

    if (row === 1) seats = 26;
    if (row === 20) seats = 14;

    for (let i = 1; i <= seats; i++) {

        // luki (bazując na pełnym układzie)
        if (i === 8 || i === 22) {
            const gap = document.createElement("div");
            gap.classList.add("gap");
            rowDiv.appendChild(gap);
        }

        const seatId = `R${row}M${i}`;

        const btn = document.createElement("button");
        btn.classList.add("seat");
        btn.innerText = i;

        const saved = localStorage.getItem(seatId);

        if (saved) {
            btn.classList.add("occupied");
        }

        btn.onclick = () => {
            const data = localStorage.getItem(seatId);

            if (data) {
                alert(`Miejsce zajęte przez:\n${data}`);
                return;
            }

            selectedSeat = seatId;
            form.style.display = "block";
        };

        rowDiv.appendChild(btn);
    }

    hall.appendChild(rowDiv);

    if (row === 10) {
        const gapRow = document.createElement("div");
        gapRow.classList.add("big-gap");
        hall.appendChild(gapRow);
    }
}

function reserveSeat() {
    const name = nameInput.value;

    if (!name) {
        alert("Wpisz dane!");
        return;
    }

    localStorage.setItem(selectedSeat, name);
    location.reload();
}
</script>

</body>
</html>
