<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; margin:0; padding:0; }

/* top bar */
.top-bar {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
}
input { padding: 5px; min-width: 100px; }
button { padding: 5px 10px; cursor: pointer; }

/* scena */
.stage {
    position: sticky;
    top: 0;
    z-index: 10;
    width: min(800px, 95vw);
    height: 40px;
    background-color: #d2a679;
    margin: 10px auto;
}

/* scroll poziomy */
#hall-container {
    width: 100%;
    overflow-x: auto;
    display: flex;
    justify-content: center;
}
#hall {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: max-content;
}
.row { display: flex; justify-content: center; margin: 4px 0; }

/* fotele skierowane do sceny */
.seat {
    width: min(36px,4vw);
    aspect-ratio: 1 / 1.2;
    margin: min(3px,0.5vw);
    background: linear-gradient(to top, #3c763d 0%, #5cb85c 60%, #4cae4c 100%);
    border-radius: 8px 8px 4px 4px;
    border-bottom: 4px solid #2e6d2f;
    color: white;
    font-size: min(12px,1.5vw);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}
.selected { background: orange; border-bottom-color: #b36e00; }
.occupied { background: gray; cursor: not-allowed; border-bottom-color: #555; }
.highlight { outline: 3px solid yellow; }

.gap { width: min(15px, 2vw); }
.big-gap { height: min(25px, 3vw); }

#selectedCount { margin-top: 10px; text-align: center; font-weight: bold; }
#reserveBtn { display: block; margin: 20px auto; padding: 12px 25px; font-size: 16px; }

/* modal */
#modal, #adminModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 100;
}
.modalContent {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.modalContent input { padding: 10px; font-size: 16px; width: 100%; }
.modalContent button { padding: 10px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>

<div class="top-bar">
    🔍 <input type="text" id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<div class="stage"></div>

<div id="hall-container">
    <div id="hall"></div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>
<button id="reserveBtn">ZAREZERWUJ</button>

<!-- Modal rezerwacji -->
<div id="modal">
    <div class="modalContent">
        <h3>Wpisz imię i nazwisko</h3>
        <input type="text" id="modalName">
        <div style="display:flex;justify-content:space-between;">
            <button id="cancelModal">ANULUJ</button>
            <button id="saveModal">ZAPISZ</button>
        </div>
    </div>
</div>

<!-- Modal admina -->
<div id="adminModal">
    <div class="modalContent">
        <h3 id="adminSeatInfo"></h3>
        <input type="password" id="adminPassword" placeholder="Wpisz hasło admina">
        <div style="display:flex;justify-content:space-between;">
            <button id="adminCancel">ANULUJ</button>
            <button id="adminConfirm">USUŃ REZERWACJĘ</button>
        </div>
    </div>
</div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCgNJ5Ex6z0_aeqvwjDzwjTMQuTvqwdwVA",
  authDomain: "salarezerwacji.firebaseapp.com",
  databaseURL: "https://salarezerwacji-default-rtdb.firebaseio.com",
  projectId: "salarezerwacji",
  storageBucket: "salarezerwacji.firebasestorage.app",
  messagingSenderId: "64800282675",
  appId: "1:64800282675:web:a13faff668f5a9f2be6b46",
  measurementId: "G-XNGQ5QYXYE"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// zmienne
const hall = document.getElementById("hall");
const selectedCountDiv = document.getElementById("selectedCount");
let selectedSeats = [];
let dragSelecting = false;
document.addEventListener("mouseup", () => dragSelecting = false);

// Tworzenie sali
for(let row=1; row<=20; row++){
    const rowDiv=document.createElement("div");
    rowDiv.classList.add("row");
    let seats = row===1?26:(row===20?14:28);
    for(let i=1;i<=seats;i++){
        if(row!==20){
            if((row===1&&(i===7||i===21))||(row!==1&&(i===8||i===22))){
                const gap=document.createElement("div");
                gap.classList.add("gap");
                rowDiv.appendChild(gap);
            }
        }
        const seatId = `R${row}M${i}`;
        const btn=document.createElement("button");
        btn.classList.add("seat");
        btn.id=seatId;
        btn.innerText=i;
        btn.addEventListener("mousedown",()=>{dragSelecting=true;handleSeatClick(btn,seatId);});
        btn.addEventListener("mouseenter",()=>{if(dragSelecting) handleSeatClick(btn,seatId,true);});
        rowDiv.appendChild(btn);
    }
    hall.appendChild(rowDiv);
    if(row===10){const gapRow=document.createElement("div"); gapRow.classList.add("big-gap"); hall.appendChild(gapRow);}
}

function handleSeatClick(btn, seatId, isDrag=false){
    if(btn.classList.contains("occupied")) return;
    btn.classList.toggle("selected");
    if(selectedSeats.includes(seatId)) selectedSeats=selectedSeats.filter(s=>s!==seatId);
    else selectedSeats.push(seatId);
    selectedCountDiv.innerText = `Wybrane miejsca: ${selectedSeats.length}`;
}

// Modal rezerwacji
const modal=document.getElementById("modal");
const modalName=document.getElementById("modalName");
document.getElementById("reserveBtn").onclick=()=>{
    if(!selectedSeats.length) return alert("Wybierz miejsce");
    modal.style.display="flex";
};
document.getElementById("cancelModal").onclick=()=>{modal.style.display="none"; modalName.value="";};
document.getElementById("saveModal").onclick=()=>{
    const name=modalName.value.trim();
    if(!name) return alert("Podaj imię");
    selectedSeats.forEach(id=>{
        const btn=document.getElementById(id);
        btn.classList.remove("selected");
        btn.classList.add("occupied");
        btn.dataset.name=name;
        db.ref('seats/'+id).set({name:name,occupied:true});
    });
    selectedSeats=[];
    selectedCountDiv.innerText="Wybrane miejsca: 0";
    modal.style.display="none";
    modalName.value="";
};

// Pobieranie rezerwacji z Firebase
db.ref('seats').on('value', snapshot=>{
    const data=snapshot.val()||{};
    Object.keys(data).forEach(id=>{
        const btn=document.getElementById(id);
        if(btn){ btn.classList.add('occupied'); btn.dataset.name=data[id].name; }
    });
});

// Wyszukiwarka
function searchPerson(){
    const search=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".seat").forEach(btn=>{
        btn.classList.remove("highlight");
        if(btn.dataset.name && btn.dataset.name.toLowerCase().includes(search))
            btn.classList.add("highlight");
    });
}

// Admin modal
const adminModal=document.getElementById("adminModal");
const adminSeatInfo=document.getElementById("adminSeatInfo");
const adminPassword=document.getElementById("adminPassword");
const adminCancel=document.getElementById("adminCancel");
const adminConfirm=document.getElementById("adminConfirm");
const ADMIN_PASSWORD="tajnehaslo"; // zmień na swoje

hall.addEventListener("click",e=>{
    const btn=e.target;
    if(btn.classList.contains("occupied")){
        adminSeatInfo.innerText=`Zajęte przez: ${btn.dataset.name}\nMiejsce: ${btn.id}`;
        adminModal.style.display="flex";
        adminConfirm.dataset.seatId=btn.id;
    }
});
adminCancel.onclick=()=>{
    adminModal.style.display="none";
    adminPassword.value="";
};
adminConfirm.onclick=()=>{
    const seatId=adminConfirm.dataset.seatId;
    if(adminPassword.value!==ADMIN_PASSWORD){ alert("Niepoprawne hasło!"); return; }
    db.ref('seats/'+seatId).remove();
    const btn=document.getElementById(seatId);
    btn.classList.remove("occupied");
    delete btn.dataset.name;
    adminModal.style.display="none";
    adminPassword.value="";
};

// Scroll poziomy do środka
window.addEventListener("load", () => {
    const container = document.getElementById("hall-container");
    container.scrollLeft = (container.scrollWidth - container.clientWidth) / 2;
});
</script>
</body>
</html>
