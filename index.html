<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala PRO+</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#111; color:white; }

.top-bar { display:flex; justify-content:center; gap:10px; padding:15px; }

.stage {
    width:90%;
    height:40px;
    background:#d2a679;
    margin:10px auto;
}

/* SALA */
#hall-container { overflow-x:auto; display:flex; justify-content:center; }
#hall { display:flex; flex-direction:column; align-items:center; min-width:max-content; }

.row { display:flex; margin:4px 0; }

/* FOTELE */
.seat {
    width:34px;
    height:40px;
    margin:3px;
    background:#2ecc71;
    border-radius:6px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:11px;
    cursor:pointer;
    transition:.15s;
}
.seat:hover { transform:scale(1.2); }
.selected { background:orange; }
.occupied { background:#555; cursor:not-allowed; }

.gap { width:15px; }
.big-gap { height:25px; }

button { padding:8px 12px; }

/* MODALE */
.modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}
.box {
    background:#222;
    padding:20px;
    border-radius:10px;
}

/* ADMIN */
#adminPanel {
    position:fixed;
    right:-400px;
    top:0;
    width:400px;
    height:100%;
    background:#222;
    padding:20px;
    overflow:auto;
    transition:0.3s;
}
#adminPanel.open { right:0; }

table { width:100%; }
td,th { padding:5px; border-bottom:1px solid #444; text-align:center; }
</style>
</head>

<body>

<div class="top-bar">
<input id="search" placeholder="Szukaj">
<button onclick="searchPerson()">Szukaj</button>
<button onclick="openAdminLogin()">ADMIN</button>
</div>

<div class="stage"></div>

<div id="hall-container">
<div id="hall"></div>
</div>

<div id="stats" style="text-align:center;margin:10px;"></div>

<button onclick="openModal()" style="display:block;margin:20px auto;">ZAREZERWUJ</button>

<!-- REZERWACJA -->
<div id="modal" class="modal">
<div class="box">
<h3>Dane</h3>
<input id="name"><br><br>
<button onclick="save()">ZAPISZ</button>
<button onclick="closeModal()">ANULUJ</button>
</div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="modal">
<div class="box">
<h3>Hasło</h3>
<input id="adminPass" type="password"><br><br>
<button onclick="loginAdmin()">WEJDŹ</button>
</div>
</div>

<!-- PANEL -->
<div id="adminPanel">
<h3>Panel admina</h3>
<div id="adminStats"></div>
<table>
<thead><tr><th>Osoba</th><th>R</th><th>M</th><th></th></tr></thead>
<tbody id="adminTable"></tbody>
</table>
</div>

<script>
const ADMIN_PASSWORD="1234";

const firebaseConfig={
 databaseURL:"https://salarezerwacji-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let selected=[];

/* TWORZENIE */
for(let r=1;r<=20;r++){
let row=document.createElement("div");
row.className="row";

let seats=r==1?26:(r==20?14:28);

for(let i=1;i<=seats;i++){

if(r!==20){
if((r==1&&(i==7||i==21))||(r!==1&&(i==8||i==22))){
let g=document.createElement("div");
g.className="gap";
row.appendChild(g);
}
}

let b=document.createElement("div");
b.className="seat";
b.innerText=i;
b.id=`R${r}M${i}`;

b.onclick=()=>clickSeat(b);

row.appendChild(b);
}

hall.appendChild(row);

if(r==10){
let g=document.createElement("div");
g.className="big-gap";
hall.appendChild(g);
}
}

/* CLICK */
function clickSeat(b){
if(b.classList.contains("occupied")) return;
b.classList.toggle("selected");

if(selected.includes(b.id))
selected=selected.filter(x=>x!==b.id);
else selected.push(b.id);
}

/* MODAL */
function openModal(){
if(!selected.length) return alert("Wybierz miejsce");
modal.style.display="flex";
}
function closeModal(){ modal.style.display="none"; }

/* SAVE + PDF */
function save(){
let name=document.getElementById("name").value;

selected.forEach(id=>{
db.ref("seats/"+id).set({name});
generatePDF(name,id);
});

selected=[];
closeModal();
}

/* 🔥 PIĘKNY BILET + QR */
function generatePDF(name,id){

const {jsPDF}=window.jspdf;
let pdf=new jsPDF({orientation:"landscape"});

pdf.setFillColor(30,30,30);
pdf.rect(0,0,297,210,"F");

pdf.setTextColor(255,255,255);
pdf.setFontSize(30);
pdf.text("BILET VIP",20,30);

pdf.setFontSize(18);
pdf.text("Imię: "+name,20,60);
pdf.text("Miejsce: "+id,20,80);

/* QR */
let qrDiv=document.createElement("div");
new QRCode(qrDiv,{text:id,width:100,height:100});

setTimeout(()=>{
let img=qrDiv.querySelector("img").src;
pdf.addImage(img,"PNG",200,50,60,60);
pdf.save("bilet_"+id+".pdf");
},300);
}

/* LOAD */
db.ref("seats").on("value",snap=>{
let data=snap.val()||{};

document.querySelectorAll(".seat").forEach(b=>{
b.classList.remove("occupied");
});

Object.keys(data).forEach(id=>{
let b=document.getElementById(id);
if(b){
b.classList.add("occupied");
b.dataset.name=data[id].name;
}
});

updateStats(data);
updateAdmin(data);
});

/* STATS */
function updateStats(data){
let occ=Object.keys(data).length;
let all=document.querySelectorAll(".seat").length;
stats.innerText=`Zajęte: ${occ} | Wolne: ${all-occ}`;
}

/* ADMIN */
function openAdminLogin(){ adminLogin.style.display="flex"; }

function loginAdmin(){
if(adminPass.value===ADMIN_PASSWORD){
adminLogin.style.display="none";
adminPanel.classList.add("open");
}else alert("Złe hasło");
}

function updateAdmin(data){
let html="";
Object.keys(data).forEach(id=>{
let r=id.match(/R(\d+)/)[1];
let m=id.match(/M(\d+)/)[1];

html+=`
<tr>
<td>${data[id].name}</td>
<td>${r}</td>
<td>${m}</td>
<td><button onclick="removeSeat('${id}')">❌</button></td>
</tr>`;
});
adminTable.innerHTML=html;
}

function removeSeat(id){
db.ref("seats/"+id).remove();
}

/* SEARCH */
function searchPerson(){
let s=search.value.toLowerCase();
document.querySelectorAll(".seat").forEach(b=>{
b.style.outline="";
if(b.dataset.name && b.dataset.name.toLowerCase().includes(s))
b.style.outline="3px solid yellow";
});
}
</script>

</body>
</html>
