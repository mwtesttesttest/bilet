<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ŁADNA CZCIONKA -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<title>Sala rezerwacji PRO</title>

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* (Twoje style zostają) */

.top-bar {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
}

input { padding: 5px; min-width: 100px; }
button { padding: 5px 10px; cursor: pointer; }

#hall-container {
    width: 100%;
    display: flex;
    justify-content: center;
}

#hall {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0 5px;
    max-width: 100%;
    transform-origin: top center;
}

.row {
    display: flex;
    justify-content: center;
    margin: 5px 0;
}

.seat {
    width: 35px;
    height: 35px;
    margin: 3px;
    background-color: green;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 12px;
}

.selected { background-color: orange; }
.occupied { background-color: gray; cursor: not-allowed; }
.highlight { outline: 3px solid yellow; }

.gap { width: 15px; }
.big-gap { height: 25px; }

.stage {
    width: calc((22 - 6 + 1) * 39px);
    height: 30px;
    background-color: #d2a679;
    margin-bottom: 15px;
}

#selectedCount { margin-top: 10px; font-weight: bold; }

#reserveBtn {
    margin: 20px 0;
    padding: 12px 25px;
    font-size: 16px;
}

/* 🔥 NOWY ŁADNY MODAL */
#modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

#modalContent {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    animation: fadeIn 0.2s ease;
}

#modalContent h3 {
    margin-bottom: 5px;
}

#modalContent input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 10px;
}

.modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.modal-buttons button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
}

#cancelModal { background: #eee; }
#saveModal { background: #4CAF50; color: white; }

@keyframes fadeIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* Twoje skalowanie zostaje */
@media(max-width: 1024px){ #hall { transform: scale(0.8); } }
@media(max-width: 768px){ #hall { transform: scale(0.65); } }
@media(max-width: 480px){ #hall { transform: scale(0.5); } }

</style>
</head>
<body>

<div class="top-bar">
    🔍 <input type="text" id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<div class="stage"></div>

<div id="hall-container">
    <div id="hall"></div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>

<button id="reserveBtn">ZAREZERWUJ</button>

<!-- MODAL -->
<div id="modal">
    <div id="modalContent">
        <h3>Rezerwacja</h3>
        <p>Podaj imię i nazwisko</p>
        <input type="text" id="modalName">
        <div class="modal-buttons">
            <button id="cancelModal">Anuluj</button>
            <button id="saveModal">Zapisz</button>
        </div>
    </div>
</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "bilet-eeb4b.firebaseapp.com",
  projectId: "bilet-eeb4b",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const hall = document.getElementById("hall");
const selectedCountDiv = document.getElementById("selectedCount");
let selectedSeats = [];
let dragSelecting = false;

// realtime update
db.collection("seats").onSnapshot(snapshot=>{
    snapshot.docChanges().forEach(change=>{
        const id = change.doc.id;
        const btn = document.getElementById(id);
        if(!btn) return;

        if(change.type==="added" || change.type==="modified"){
            btn.classList.add("occupied");
            btn.dataset.name = change.doc.data().name;
            btn.classList.remove("selected");
        }

        if(change.type==="removed"){
            btn.classList.remove("occupied");
            delete btn.dataset.name;
        }
    });
});

document.addEventListener("mouseup",()=>dragSelecting=false);

function updateSelectedCount(){
    selectedCountDiv.innerText=`Wybrane miejsca: ${selectedSeats.length}`;
}

// tworzenie sali (BEZ ZMIAN)
for (let row=1; row<=20; row++){
    const rowDiv=document.createElement("div");
    rowDiv.classList.add("row");

    let seats=28;
    if(row===1) seats=26;
    if(row===20) seats=14;

    for(let i=1;i<=seats;i++){
        if(row!==20){
            if(row===1){
                if(i===7||i===21){const gap=document.createElement("div");gap.classList.add("gap");rowDiv.appendChild(gap);}
            } else {
                if(i===8||i===22){const gap=document.createElement("div");gap.classList.add("gap");rowDiv.appendChild(gap);}
            }
        }

        const seatId=`R${row}M${i}`;
        const btn=document.createElement("button");
        btn.classList.add("seat");
        btn.id=seatId;
        btn.innerText=i;

        btn.addEventListener("mousedown",()=>{dragSelecting=true;handleSeatClick(btn,seatId);});
        btn.addEventListener("mouseenter",()=>{if(dragSelecting)handleSeatClick(btn,seatId,true);});

        rowDiv.appendChild(btn);
    }

    hall.appendChild(rowDiv);

    if(row===10){
        const gapRow=document.createElement("div");
        gapRow.classList.add("big-gap");
        hall.appendChild(gapRow);
    }
}

function handleSeatClick(btn,seatId,isDrag=false){
    if(btn.classList.contains("occupied")){
        const name=btn.dataset.name;
        if(!isDrag && confirm(`Zajęte przez: ${name}\nUsunąć?`)){
            db.collection("seats").doc(seatId).delete();
        }
        return;
    }

    btn.classList.toggle("selected");

    if(selectedSeats.includes(seatId)){
        selectedSeats=selectedSeats.filter(s=>s!==seatId);
    } else {
        selectedSeats.push(seatId);
    }

    updateSelectedCount();
}

// modal
const reserveBtn=document.getElementById("reserveBtn");
const modal=document.getElementById("modal");
const modalName=document.getElementById("modalName");

reserveBtn.onclick=()=>{
    if(selectedSeats.length===0) return alert("Wybierz miejsca");
    modal.style.display="flex";
};

document.getElementById("cancelModal").onclick=()=>modal.style.display="none";

document.getElementById("saveModal").onclick=()=>{
    const name=modalName.value.trim();
    if(!name) return alert("Wpisz dane");

    selectedSeats.forEach(id=>{
        db.collection("seats").doc(id).set({name});
    });

    selectedSeats=[];
    updateSelectedCount();
    modal.style.display="none";
};

// wyszukiwarka
function searchPerson(){
    const search=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".seat").forEach(btn=>{
        btn.classList.remove("highlight");
        if(btn.dataset.name && btn.dataset.name.toLowerCase().includes(search)){
            btn.classList.add("highlight");
        }
    });
}
</script>

</body>
</html>
