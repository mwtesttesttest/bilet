<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }

/* 🔥 ulepszony search */
.top-bar {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 10px;
}
input {
    padding: 10px;
    min-width: 220px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button { padding: 5px 10px; cursor: pointer; }

.stage {
    width: min(800px, 95vw);
    height: 40px;
    background-color: #d2a679;
    margin: 10px auto 20px auto;
}

#hall-container {
    width: 100%;
    overflow-x: auto;
    display: flex;
    justify-content: center;
}
#hall {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: max-content;
}
.row { display: flex; justify-content: center; margin: 4px 0; }

.seat {
    width: min(36px,4vw);
    aspect-ratio: 1 / 1.2;
    margin: min(3px,0.5vw);
    background: linear-gradient(to top, #3c763d 0%, #5cb85c 60%, #4cae4c 100%);
    border-radius: 8px 8px 4px 4px;
    border-bottom: 4px solid #2e6d2f;
    color: white;
    font-size: min(12px,1.5vw);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}
.selected { background: orange; }
.occupied { background: gray; cursor: not-allowed; }
.highlight { outline: 3px solid yellow; }

.gap { width: min(15px,2vw); }
.big-gap { height: min(25px,3vw); }

#seatCounts {
    display:flex; justify-content:center; gap:15px; margin-top:10px;
}
</style>
</head>

<body>

<div class="top-bar">
    🔍 <input type="text" id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<div class="stage"></div>

<div id="hall-container">
    <div id="hall"></div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>
<div id="seatCounts">
    <div id="freeCount">Wolne miejsca: 0</div>
    <div id="occupiedCount">Zajęte miejsca: 0</div>
</div>

<button id="reserveBtn">ZAREZERWUJ</button>

<!-- modal -->
<div id="modal">
<div class="modalContent">
<input id="modalName">
<button id="saveModal">ZAPISZ</button>
</div>
</div>

<!-- 🔥 PANEL ADMINA -->
<button id="adminPanelBtn" style="position:fixed;bottom:15px;right:15px;">ADMIN</button>

<div id="adminPanel" style="display:none;position:fixed;right:0;top:0;width:300px;height:100%;background:white;overflow:auto;">
    <h3>Rezerwacje</h3>
    <div id="adminList"></div>
</div>

<script>

// Firebase
const firebaseConfig = { databaseURL:"https://salarezerwacji-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const hall = document.getElementById("hall");
let selectedSeats = [];

// 🔥 generowanie sali + numery rzędów
for(let row=1; row<=20; row++){

    const rowDiv=document.createElement("div");
    rowDiv.classList.add("row");

    for(let i=1;i<=20;i++){
        const seatId=`R${row}M${i}`;
        const btn=document.createElement("button");
        btn.classList.add("seat");
        btn.id=seatId;
        btn.innerText=i;

        btn.onclick=()=>{
            if(btn.classList.contains("occupied")) return;
            btn.classList.toggle("selected");

            if(selectedSeats.includes(seatId))
                selectedSeats=selectedSeats.filter(s=>s!==seatId);
            else selectedSeats.push(seatId);
        };

        rowDiv.appendChild(btn);
    }

    const wrapper=document.createElement("div");
    wrapper.style.display="flex";
    wrapper.appendChild(rowDiv);

    const label=document.createElement("div");
    label.innerText=row;
    label.style.marginLeft="10px";
    wrapper.appendChild(label);

    hall.appendChild(wrapper);
}

// 🔥 PDF (tylko zmniejszona czcionka)
async function generujWszystkieBiletyPDF(name, seats){

    const existingPdfBytes = await fetch("bilet.pdf").then(res => res.arrayBuffer());
    const basePdf = await PDFLib.PDFDocument.load(existingPdfBytes);
    const finalPdf = await PDFLib.PDFDocument.create();

    const font = await finalPdf.embedFont(PDFLib.StandardFonts.HelveticaBold);

    for(const seatId of seats){

        const [pageTemplate] = await finalPdf.copyPages(basePdf, [0]);
        finalPdf.addPage(pageTemplate);

        const page = finalPdf.getPages()[finalPdf.getPageCount()-1];

        const row = seatId.match(/R(\d+)/)[1];
        const seat = seatId.match(/M(\d+)/)[1];

        page.drawText(name, { x:120, y:180, size:11, font });
        page.drawText(row, { x:300, y:36, size:11, font });
        page.drawText(seat,{ x:330, y:36, size:11, font });
    }

    const [qrPage] = await finalPdf.copyPages(basePdf, [1]);
    finalPdf.addPage(qrPage);

    const pdfBytes = await finalPdf.save();

    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([pdfBytes]));
    link.download = "Bilety.pdf";
    link.click();
}

// zapis
document.getElementById("saveModal").onclick=()=>{
    const name=document.getElementById("modalName").value;

    selectedSeats.forEach(id=>{
        db.ref('seats/'+id).set({name:name,occupied:true});
    });

    generujWszystkieBiletyPDF(name, selectedSeats);
    selectedSeats=[];
};

// 🔥 ADMIN PANEL
const ADMIN_PASSWORD="tajnehaslo";

document.getElementById("adminPanelBtn").onclick=()=>{
    const pass=prompt("Hasło:");
    if(pass!==ADMIN_PASSWORD) return;
    document.getElementById("adminPanel").style.display="block";
};

db.ref('seats').on('value', snapshot=>{
    const data=snapshot.val()||{};
    const list=document.getElementById("adminList");
    list.innerHTML="";

    Object.keys(data).forEach(id=>{
        const div=document.createElement("div");
        div.innerHTML=`${data[id].name} (${id}) <button onclick="usun('${id}')">X</button>`;
        list.appendChild(div);
    });
});

function usun(id){
    db.ref('seats/'+id).remove();
}

// wyszukiwarka
function searchPerson(){
    const val=document.getElementById("search").value.toLowerCase();

    document.querySelectorAll(".seat").forEach(btn=>{
        btn.classList.remove("highlight");
        if(btn.dataset.name && btn.dataset.name.toLowerCase().includes(val))
            btn.classList.add("highlight");
    });
}

</script>
</body>
</html>
