<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sala rezerwacji PRO</title>

<style>
body { font-family: Arial; text-align: center; }

.stage {
    width: 80%;
    height: 60px;
    background-color: #d2a679;
    margin: 20px auto;
    line-height: 60px;
    font-weight: bold;
    display: flex;
    justify-content: flex-start;
    padding-left: calc(5 * 28px / 1.2); /* scena od 5 miejsca */
}

.top-bar {
    margin: 10px;
}

input {
    padding: 5px;
}

.row {
    display: flex;
    justify-content: center;
    margin: 5px 0;
}

.row.first-row {
    margin-left: -20px; /* wyrównanie rzędów */
}

.seat {
    width: 35px;  /* większe miejsca */
    height: 35px;
    margin: 3px;
    background-color: green;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
}

.selected {
    background-color: orange;
}

.occupied {
    background-color: gray;
    cursor: not-allowed;
}

.highlight {
    outline: 3px solid yellow;
}

.gap { width: 20px; }
.big-gap { height: 30px; }

</style>
</head>
<body>

<div class="top-bar">
    🔍 <input type="text" id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<div class="stage">SCENA</div>

<div id="hall"></div>

<div>
    <input type="text" id="name" placeholder="Imię i nazwisko">
    <button onclick="reserveSeats()">Zarezerwuj zaznaczone</button>
</div>

<script>
const hall = document.getElementById("hall");
let selectedSeats = [];

// przykładowe zajęte miejsca
let occupiedSeats = ["R1M1", "R1M2", "R3M5"];

// mapa zdrobnień
const nicknames = {
    "bartek": "Bartosz",
    "jarek": "Jarosław",
    "kuba": "Jakub",
    "ola": "Aleksandra",
    "ania": "Anna"
};

// tworzenie sali
for (let row = 1; row <= 20; row++) {
    const rowDiv = document.createElement("div");
    rowDiv.classList.add("row");
    if (row === 1) rowDiv.classList.add("first-row");

    let seats = 28;
    if (row === 1) seats = 26;
    if (row === 20) seats = 14;

    for (let i = 1; i <= seats; i++) {
        if (i === 8 || i === 22) {
            const gap = document.createElement("div");
            gap.classList.add("gap");
            rowDiv.appendChild(gap);
        }

        const seatId = `R${row}M${i}`;
        const btn = document.createElement("button");
        btn.classList.add("seat");
        btn.innerText = i;
        btn.id = seatId;

        if (occupiedSeats.includes(seatId)) {
            btn.classList.add("occupied");
            btn.dataset.name = "Jan Kowalski";
        }

        btn.onclick = () => handleSeatClick(btn, seatId);
        rowDiv.appendChild(btn);
    }

    hall.appendChild(rowDiv);

    if (row === 10) {
        const gapRow = document.createElement("div");
        gapRow.classList.add("big-gap");
        hall.appendChild(gapRow);
    }
}

// kliknięcie miejsca
function handleSeatClick(btn, seatId) {
    if (btn.classList.contains("occupied")) {
        const name = btn.dataset.name;
        if (confirm(`Zajęte przez: ${name}\nUsunąć rezerwację?`)) {
            btn.classList.remove("occupied");
            delete btn.dataset.name;
        }
        return;
    }

    btn.classList.toggle("selected");

    if (selectedSeats.includes(seatId)) {
        selectedSeats = selectedSeats.filter(s => s !== seatId);
    } else {
        selectedSeats.push(seatId);
    }
}

// rezerwacja miejsc
function reserveSeats() {
    const name = document.getElementById("name").value.trim();
    if (!name || selectedSeats.length === 0) {
        alert("Wpisz dane i wybierz miejsca");
        return;
    }

    selectedSeats.forEach(seatId => {
        const btn = document.getElementById(seatId);
        btn.classList.remove("selected");
        btn.classList.add("occupied");
        btn.dataset.name = name;
    });

    selectedSeats = [];
}

// wyszukiwarka z uwzględnieniem zdrobnień
function searchPerson() {
    let search = document.getElementById("search").value.toLowerCase();

    // zamiana zdrobnień na pełne imię
    if (nicknames[search]) search = nicknames[search].toLowerCase();

    document.querySelectorAll(".seat").forEach(btn => {
        btn.classList.remove("highlight");
        if (btn.dataset.name && btn.dataset.name.toLowerCase().includes(search)) {
            btn.classList.add("highlight");
        }
    });
}
</script>

</body>
</html>
