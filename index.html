<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; margin:0; padding:0; }

.top-bar {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
}
input { padding: 5px; min-width: 100px; }
button { padding: 5px 10px; cursor: pointer; }

.stage {
    width: min(800px, 95vw);
    height: 40px;
    background-color: #d2a679;
    margin: 10px auto;
}

#hall-container {
    width: 100%;
    overflow-x: auto;
    display: flex;
    justify-content: center;
}
#hall {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: max-content;
}
.row { display: flex; justify-content: center; margin: 4px 0; }

/* 🔥 animacja + lepszy efekt */
.seat {
    width: min(36px,4vw);
    aspect-ratio: 1 / 1.2;
    margin: min(3px,0.5vw);
    background: linear-gradient(to top, #3c763d, #5cb85c);
    border-radius: 8px 8px 4px 4px;
    border-bottom: 4px solid #2e6d2f;
    color: white;
    font-size: min(12px,1.5vw);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.15s;
}
.seat:hover { transform: scale(1.1); }
.seat:active { transform: scale(0.8); }

.selected { background: orange; }
.occupied { background: gray; cursor: not-allowed; }
.highlight { outline: 3px solid yellow; }

.gap { width: min(15px, 2vw); }
.big-gap { height: min(25px, 3vw); }

#selectedCount { text-align:center; margin-top:10px; }
#reserveBtn { display:block; margin:20px auto; padding:12px 25px; }

/* listy */
#lists {
    display:flex;
    justify-content:center;
    gap:40px;
    margin:20px;
    flex-wrap:wrap;
}
.listBox {
    border:1px solid #ccc;
    padding:10px;
    width:250px;
    max-height:200px;
    overflow:auto;
}

/* modal */
#modal, #adminModal, #adminPanel {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}
.modalContent {
    background:white;
    padding:20px;
    border-radius:10px;
    width:300px;
}
</style>
</head>
<body>

<div class="top-bar">
    🔍 <input id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
    <button onclick="openAdminPanel()">ADMIN</button>
</div>

<div class="stage"></div>

<div id="hall-container">
    <div id="hall"></div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>
<button id="reserveBtn">ZAREZERWUJ</button>

<!-- LISTY -->
<div id="lists">
    <div class="listBox">
        <b>Wolne miejsca</b>
        <div id="freeList"></div>
    </div>
    <div class="listBox">
        <b>Zajęte miejsca</b>
        <div id="occupiedList"></div>
    </div>
</div>

<!-- Modal -->
<div id="modal">
<div class="modalContent">
<h3>Imię i nazwisko</h3>
<input id="modalName">
<button onclick="saveSeats()">ZAPISZ</button>
</div>
</div>

<!-- Admin panel -->
<div id="adminPanel">
<div class="modalContent">
<h3>Panel admina</h3>
<div id="adminList"></div>
<button onclick="closeAdmin()">Zamknij</button>
</div>
</div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "salarezerwacji.firebaseapp.com",
  databaseURL: "https://salarezerwacji-default-rtdb.firebaseio.com",
  projectId: "salarezerwacji"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const hall = document.getElementById("hall");
let selectedSeats = [];
let allSeats = [];

// tworzenie sali
for(let row=1;row<=20;row++){
    const rowDiv=document.createElement("div");
    rowDiv.classList.add("row");

    let seats=row===1?26:(row===20?14:28);

    for(let i=1;i<=seats;i++){
        if(row!==20 && (i===8||i===22)){
            const gap=document.createElement("div");
            gap.classList.add("gap");
            rowDiv.appendChild(gap);
        }

        const id=`R${row}M${i}`;
        allSeats.push(id);

        const btn=document.createElement("button");
        btn.classList.add("seat");
        btn.innerText=i;
        btn.id=id;

        btn.onclick=()=>{
            if(btn.classList.contains("occupied")) return;

            btn.classList.toggle("selected");

            selectedSeats.includes(id)
                ? selectedSeats=selectedSeats.filter(s=>s!==id)
                : selectedSeats.push(id);

            document.getElementById("selectedCount").innerText =
                "Wybrane miejsca: " + selectedSeats.length;
        };

        rowDiv.appendChild(btn);
    }

    hall.appendChild(rowDiv);
}

// modal
function saveSeats(){
    const name=document.getElementById("modalName").value;
    selectedSeats.forEach(id=>{
        db.ref("seats/"+id).set({name});
    });
    location.reload();
}

document.getElementById("reserveBtn").onclick=()=>{
    if(!selectedSeats.length) return alert("Wybierz miejsca");
    document.getElementById("modal").style.display="flex";
};

// firebase
db.ref("seats").on("value",snap=>{
    const data=snap.val()||{};

    let occupied = Object.keys(data);
    let free = allSeats.filter(s=>!occupied.includes(s));

    // listy
    document.getElementById("freeList").innerHTML = free.join("<br>");
    document.getElementById("occupiedList").innerHTML =
        occupied.map(id=>id+" ("+data[id].name+")").join("<br>");

    // oznaczenia
    document.querySelectorAll(".seat").forEach(b=>{
        b.classList.remove("occupied");
    });

    occupied.forEach(id=>{
        const btn=document.getElementById(id);
        if(btn){
            btn.classList.add("occupied");
            btn.dataset.name=data[id].name;
        }
    });

    // admin lista
    const admin=document.getElementById("adminList");
    admin.innerHTML="";
    occupied.forEach(id=>{
        const div=document.createElement("div");
        div.innerHTML = `${id} - ${data[id].name}
        <button onclick="deleteSeat('${id}')">❌</button>`;
        admin.appendChild(div);
    });
});

// admin
function openAdminPanel(){
    document.getElementById("adminPanel").style.display="flex";
}
function closeAdmin(){
    document.getElementById("adminPanel").style.display="none";
}
function deleteSeat(id){
    db.ref("seats/"+id).remove();
}

// search
function searchPerson(){
    const s=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".seat").forEach(b=>{
        b.classList.remove("highlight");
        if(b.dataset.name && b.dataset.name.toLowerCase().includes(s))
            b.classList.add("highlight");
    });
}
</script>

</body>
</html>
