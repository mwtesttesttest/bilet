<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; margin:0; }

/* top */
.top-bar {
    margin: 20px;
    display:flex;
    justify-content:center;
    gap:10px;
}

input { padding:6px; }
button { padding:6px 10px; cursor:pointer; }

/* sala */
#hall-container { overflow-x:auto; display:flex; justify-content:center; }
#hall { min-width:max-content; display:flex; flex-direction:column; align-items:center; }

.stage {
    width:100%;
    max-width:900px;
    height:40px;
    background:#d2a679;
    margin:10px 0 20px;
}

/* seats */
.row { display:flex; margin:4px 0; }

.seat {
    width:32px;
    height:38px;
    margin:3px;
    background:linear-gradient(#5cb85c,#3c763d);
    border-radius:8px 8px 4px 4px;
    border-bottom:4px solid #2e6d2f;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.15s;
}

.seat:active { transform:scale(0.85); }

.selected { background:orange; }
.occupied { background:gray; cursor:not-allowed; }
.highlight { outline:3px solid yellow; }

.gap { width:15px; }
.big-gap { height:25px; }

#selectedCount, #freeCount {
    text-align:center;
    margin-top:10px;
}

#reserveBtn {
    display:block;
    margin:20px auto;
    padding:12px 25px;
}

/* modale */
#modal, #adminLogin, #adminPanel {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modalContent {
    background:white;
    padding:20px;
    border-radius:10px;
    width:300px;
}

/* admin list */
.admin-row {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}
</style>
</head>
<body>

<div class="top-bar">
    🔍 <input id="search" placeholder="Szukaj">
    <button onclick="searchPerson()">Szukaj</button>
    <button onclick="openAdminLogin()">ADMIN</button>
</div>

<div id="hall-container">
    <div id="hall">
        <div class="stage"></div>
    </div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>
<div id="freeCount">Wolne miejsca: ...</div>

<button id="reserveBtn">ZAREZERWUJ</button>

<!-- MODAL REZERWACJI -->
<div id="modal">
<div class="modalContent">
<h3>Imię i nazwisko</h3>
<input id="modalName">
<div style="display:flex;justify-content:space-between;">
<button id="cancelModal">ANULUJ</button>
<button id="saveModal">ZAPISZ</button>
</div>
</div>
</div>

<!-- LOGIN ADMIN -->
<div id="adminLogin">
<div class="modalContent">
<h3>Hasło admina</h3>
<input type="password" id="adminPass">
<button onclick="loginAdmin()">ZALOGUJ</button>
</div>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel">
<div class="modalContent">
<h3>Panel admina</h3>
<div id="adminList"></div>
<button onclick="closeAdmin()">Zamknij</button>
</div>
</div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCgNJ5Ex6z0_aeqvwjDzwjTMQuTvqwdwVA",
  authDomain: "salarezerwacji.firebaseapp.com",
  databaseURL: "https://salarezerwacji-default-rtdb.firebaseio.com",
  projectId: "salarezerwacji"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const hall = document.getElementById("hall");
let selectedSeats = [];
let totalSeats = 0;

// tworzenie sali
for(let row=1;row<=20;row++){
    const rowDiv=document.createElement("div");
    rowDiv.classList.add("row");

    let seats=row===1?26:(row===20?14:28);
    totalSeats+=seats;

    for(let i=1;i<=seats;i++){
        if(row!==20 && (i===8||i===22)){
            const gap=document.createElement("div");
            gap.classList.add("gap");
            rowDiv.appendChild(gap);
        }

        const id=`R${row}M${i}`;
        const btn=document.createElement("div");
        btn.classList.add("seat");
        btn.innerText=i;
        btn.id=id;

        btn.onclick=()=>{
            if(btn.classList.contains("occupied")) return;

            btn.classList.toggle("selected");

            selectedSeats.includes(id)
                ? selectedSeats=selectedSeats.filter(s=>s!==id)
                : selectedSeats.push(id);

            document.getElementById("selectedCount").innerText =
                "Wybrane miejsca: " + selectedSeats.length;
        };

        rowDiv.appendChild(btn);
    }

    hall.appendChild(rowDiv);
}

// modal rezerwacji
const modal=document.getElementById("modal");
const modalName=document.getElementById("modalName");

document.getElementById("reserveBtn").onclick=()=>{
    if(!selectedSeats.length) return alert("Wybierz miejsca");
    modal.style.display="flex";
    modalName.value="";
};

document.getElementById("cancelModal").onclick=()=>{
    modal.style.display="none";
};

document.getElementById("saveModal").onclick=()=>{
    const name=modalName.value.trim();
    if(!name) return alert("Podaj imię");

    selectedSeats.forEach(id=>{
        db.ref("seats/"+id).set({name});
    });

    selectedSeats=[];
    modal.style.display="none";
};

// firebase load + licznik + admin
db.ref("seats").on("value",snap=>{
    const data=snap.val()||{};
    const reserved=Object.keys(data).length;

    document.getElementById("freeCount").innerText =
        "Wolne miejsca: " + (totalSeats-reserved);

    document.querySelectorAll(".seat").forEach(b=>{
        b.classList.remove("occupied");
    });

    Object.keys(data).forEach(id=>{
        const btn=document.getElementById(id);
        if(btn){
            btn.classList.add("occupied");
            btn.dataset.name=data[id].name;
        }
    });

    // admin lista
    const list=document.getElementById("adminList");
    list.innerHTML="";
    Object.keys(data).forEach(id=>{
        const div=document.createElement("div");
        div.className="admin-row";
        div.innerHTML=`${id} - ${data[id].name}
        <button onclick="deleteSeat('${id}')">❌</button>`;
        list.appendChild(div);
    });
});

// admin
const ADMIN_PASSWORD="tajnehaslo";

function openAdminLogin(){
    document.getElementById("adminLogin").style.display="flex";
}

function loginAdmin(){
    if(document.getElementById("adminPass").value===ADMIN_PASSWORD){
        document.getElementById("adminLogin").style.display="none";
        document.getElementById("adminPanel").style.display="flex";
    } else alert("Złe hasło");
}

function closeAdmin(){
    document.getElementById("adminPanel").style.display="none";
}

function deleteSeat(id){
    db.ref("seats/"+id).remove();
}

// wyszukiwarka
function searchPerson(){
    const s=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".seat").forEach(b=>{
        b.classList.remove("highlight");
        if(b.dataset.name && b.dataset.name.toLowerCase().includes(s))
            b.classList.add("highlight");
    });
}
</script>

</body>
</html>
