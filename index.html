<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- DODANE (TYLKO TO) -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
/* TWÓJ CSS BEZ ZMIAN */
body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }
.top-bar { margin: 20px 0; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
input { padding: 5px; min-width: 100px; }
button { padding: 5px 10px; cursor: pointer; }
.stage { position: relative; width: min(800px, 95vw); height: 40px; background-color: #d2a679; margin: 10px auto 20px auto; }
#hall-container { width: 100%; overflow-x: auto; display: flex; justify-content: center; }
#hall { display: flex; flex-direction: column; align-items: center; min-width: max-content; }
.row { display: flex; justify-content: center; margin: 4px 0; }
.seat {
    width: min(36px,4vw);
    aspect-ratio: 1 / 1.2;
    margin: min(3px,0.5vw);
    background: linear-gradient(to top, #3c763d 0%, #5cb85c 60%, #4cae4c 100%);
    border-radius: 8px 8px 4px 4px;
    border-bottom: 4px solid #2e6d2f;
    color: white;
    font-size: min(12px,1.5vw);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.1s ease;
}
.seat:hover { transform: scale(1.1); }
.selected { background: orange; border-bottom-color: #b36e00; }
.occupied { background: gray; cursor: not-allowed; border-bottom-color: #555; }
.highlight { outline: 3px solid yellow; }
.gap { width: min(15px,2vw); }
.big-gap { height: min(25px,3vw); }
#selectedCount, #freeCount, #occupiedCount {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
}
#reserveBtn { display: block; margin: 20px auto; padding: 12px 25px; font-size: 16px; }
#modal, #adminModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 200;
}
.modalContent {
    background: #f9f9f9;
    padding: 25px 30px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    width: 90%;
    max-width: 450px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}
.modalContent h3 {
    font-size: 18px;
    color: #333;
    margin-bottom: 10px;
    text-align: center;
}
.modalContent input {
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
}
.modalContent button {
    padding: 12px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
}
#seatCounts {
    display:flex; justify-content:center; gap:15px; margin-top:10px;
}
</style>
</head>
<body>

<div class="top-bar">
    🔍 <input type="text" id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<div class="stage"></div>

<div id="hall-container">
    <div id="hall"></div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>
<div id="seatCounts">
    <div id="freeCount">Wolne miejsca: 0</div>
    <div id="occupiedCount">Zajęte miejsca: 0</div>
</div>

<button id="reserveBtn">ZAREZERWUJ</button>

<!-- Modal -->
<div id="modal">
    <div class="modalContent">
        <h3>Wpisz imię i nazwisko</h3>
        <input type="text" id="modalName">
        <div style="display:flex;justify-content:space-between;">
            <button id="cancelModal">ANULUJ</button>
            <button id="saveModal">ZAPISZ</button>
        </div>
    </div>
</div>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIza...",
  databaseURL: "https://salarezerwacji-default-rtdb.firebaseio.com",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// reszta Twojego JS BEZ ZMIAN aż do PDF...

// Zapis rezerwacji + PDF
document.getElementById("saveModal").onclick=()=>{
    const name=modalName.value.trim();
    if(!name) return alert("Podaj imię");

    selectedSeats.forEach(id=>{
        const btn=document.getElementById(id);
        btn.classList.remove("selected");
        btn.classList.add("occupied");
        btn.dataset.name=name;
        db.ref('seats/'+id).set({name:name,occupied:true});

        // 🔥 JEDYNA ZMIANA — PDF
        (async () => {

            const existingPdfBytes = await fetch("bilet.pdf").then(res => res.arrayBuffer());
            const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
            const page = pdfDoc.getPages()[0];

            const font = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);

            const row = id.match(/R(\d+)/)[1];
            const seat = id.match(/M(\d+)/)[1];

            page.drawText(name, { x: 45, y: 55, size: 12, font });
            page.drawText(row, { x: 360, y: 72, size: 18, font });
            page.drawText(seat, { x: 420, y: 72, size: 18, font });

            const pdfBytes = await pdfDoc.save();

            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Bilet_${id}.pdf`;
            link.click();

        })();
    });

    selectedSeats=[];
    selectedCountDiv.innerText="Wybrane miejsca: 0";
    modal.style.display="none";
    modalName.value="";
};

</script>
</body>
</html>
