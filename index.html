<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
}

/* top */
.top-bar {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
}

input { padding: 5px; min-width: 100px; }
button { padding: 5px 10px; cursor: pointer; }

/* 🔥 SCENA ZAWSZE NA GÓRZE */
.stage {
    position: sticky;
    top: 0;
    z-index: 10;
    width: min(800px, 95vw);
    height: 40px;
    background-color: #d2a679;
    margin: 10px auto;
}

/* scroll poziomy */
#hall-container {
    width: 100%;
    overflow-x: auto;
    display: flex;
    justify-content: center;
}

/* brak ucinania */
#hall {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: max-content;
}

/* rzędy */
.row {
    display: flex;
    justify-content: center;
    margin: 4px 0;
}

/* 🔥 IDEALNE KWADRATY */
.seat {
    width: min(36px, 4vw);
    aspect-ratio: 1 / 1; /* 🔥 robi z tego kwadrat */
    margin: min(3px, 0.5vw);
    background-color: green;
    color: white;
    border: none;
    cursor: pointer;
    font-size: min(12px, 1.5vw);
}

.selected { background-color: orange; }
.occupied { background-color: gray; cursor: not-allowed; }
.highlight { outline: 3px solid yellow; }

.gap { width: min(15px, 2vw); }
.big-gap { height: min(25px, 3vw); }

/* info */
#selectedCount {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
}

#reserveBtn {
    display: block;
    margin: 20px auto;
    padding: 12px 25px;
    font-size: 16px;
}

/* modal */
#modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

#modalContent {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
</style>
</head>

<body>

<div class="top-bar">
    🔍 <input type="text" id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<div class="stage"></div>

<div id="hall-container">
    <div id="hall"></div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>
<button id="reserveBtn">ZAREZERWUJ</button>

<div id="modal">
    <div id="modalContent">
        <h3>Wpisz imię i nazwisko</h3>
        <input type="text" id="modalName">
        <div style="display:flex; justify-content: space-between;">
            <button id="cancelModal">ANULUJ</button>
            <button id="saveModal">ZAPISZ</button>
        </div>
    </div>
</div>

<script>
const hall = document.getElementById("hall");
const selectedCountDiv = document.getElementById("selectedCount");
let selectedSeats = [];
let occupiedSeats = ["R1M1","R1M2","R3M5"];
let dragSelecting = false;

document.addEventListener("mouseup", () => dragSelecting = false);

function updateSelectedCount(){
    selectedCountDiv.innerText = `Wybrane miejsca: ${selectedSeats.length}`;
}

// generowanie sali
for (let row=1; row<=20; row++){
    const rowDiv = document.createElement("div");
    rowDiv.classList.add("row");

    let seats = row===1 ? 26 : (row===20 ? 14 : 28);

    for(let i=1; i<=seats; i++){
        if(row!==20){
            if((row===1 && (i===7||i===21)) || (row!==1 && (i===8||i===22))){
                const gap=document.createElement("div");
                gap.classList.add("gap");
                rowDiv.appendChild(gap);
            }
        }

        const seatId = `R${row}M${i}`;
        const btn=document.createElement("button");
        btn.classList.add("seat");
        btn.id=seatId;
        btn.innerText=i;

        if(occupiedSeats.includes(seatId)){
            btn.classList.add("occupied");
            btn.dataset.name="Jan Kowalski";
        }

        btn.addEventListener("mousedown", () => {
            dragSelecting=true;
            handleSeatClick(btn, seatId);
        });

        btn.addEventListener("mouseenter", () => {
            if(dragSelecting) handleSeatClick(btn, seatId, true);
        });

        rowDiv.appendChild(btn);
    }

    hall.appendChild(rowDiv);

    if(row===10){
        const gapRow = document.createElement("div");
        gapRow.classList.add("big-gap");
        hall.appendChild(gapRow);
    }
}

function handleSeatClick(btn, seatId, isDrag=false){
    if(btn.classList.contains("occupied")) return;

    btn.classList.toggle("selected");

    if(selectedSeats.includes(seatId)){
        selectedSeats = selectedSeats.filter(s=>s!==seatId);
    } else {
        selectedSeats.push(seatId);
    }

    updateSelectedCount();
}

// modal
const modal = document.getElementById("modal");
const modalName = document.getElementById("modalName");

document.getElementById("reserveBtn").onclick = () => {
    if(!selectedSeats.length) return alert("Wybierz miejsce");
    modal.style.display="flex";
};

document.getElementById("cancelModal").onclick = () => modal.style.display="none";

document.getElementById("saveModal").onclick = () => {
    const name = modalName.value.trim();
    if(!name) return alert("Podaj imię");

    selectedSeats.forEach(id=>{
        const btn=document.getElementById(id);
        btn.classList.remove("selected");
        btn.classList.add("occupied");
        btn.dataset.name=name;
    });

    selectedSeats=[];
    updateSelectedCount();
    modal.style.display="none";
};

// wyszukiwarka
function searchPerson(){
    const search=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".seat").forEach(btn=>{
        btn.classList.remove("highlight");
        if(btn.dataset.name && btn.dataset.name.toLowerCase().includes(search)){
            btn.classList.add("highlight");
        }
    });
}
</script>

</body>
</html>
