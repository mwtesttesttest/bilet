<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
body {
    font-family: Arial;
    margin:0;
    background: #1a1a1a;
    color: white;
}

/* TOP */
.top-bar {
    margin: 20px 0;
    display:flex;
    justify-content:center;
    gap:5px;
}
input { padding:6px; }
button { padding:6px 10px; cursor:pointer; }

/* SCROLL */
#hall-container {
    overflow-x:auto;
    display:flex;
    justify-content:center;
}
#hall {
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:max-content;
}

/* SCENA */
.stage {
    width:100%;
    max-width:900px;
    height:60px;
    background: linear-gradient(to bottom, #c89b3c, #a67c2d);
    border-radius:10px;
    margin:10px 0 30px 0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    letter-spacing:3px;
    box-shadow:0 10px 20px rgba(0,0,0,0.6);
}

/* RZĘDY */
.row {
    display:flex;
    align-items:center;
    margin:4px 0;
}

/* NUMER RZĘDU */
.row-label {
    width:30px;
    text-align:right;
    margin-right:5px;
    opacity:0.6;
    font-size:12px;
}

/* FOTELE */
.seat {
    width:32px;
    height:38px;
    margin:3px;
    background: linear-gradient(to top, #1e7a1e, #3ed13e);
    border-radius:8px 8px 4px 4px;
    border-bottom:5px solid #145214;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    cursor:pointer;
    transition:0.2s;
}

/* efekt kliknięcia */
.seat:active {
    transform: scale(0.9);
}

.selected {
    background: orange;
    border-bottom-color:#a65e00;
}

.occupied {
    background: gray;
    border-bottom-color:#444;
    cursor:not-allowed;
}

.highlight {
    outline:3px solid yellow;
}

/* przerwy */
.gap { width:15px; }
.big-gap { height:25px; }

/* dół */
#selectedCount {
    text-align:center;
    margin-top:10px;
}
#reserveBtn {
    display:block;
    margin:20px auto;
    padding:12px 25px;
}

/* MODAL */
#modal, #adminModal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}
.modalContent {
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    width:300px;
}
</style>
</head>
<body>

<div class="top-bar">
    🔍 <input type="text" id="search" placeholder="Szukaj">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<div id="hall-container">
    <div id="hall">
        <div class="stage">SCENA</div>
    </div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>
<button id="reserveBtn">ZAREZERWUJ</button>

<!-- MODALE -->
<div id="modal">
<div class="modalContent">
<h3>Imię i nazwisko</h3>
<input id="modalName">
<button onclick="saveSeats()">ZAPISZ</button>
</div>
</div>

<div id="adminModal">
<div class="modalContent">
<h3 id="adminSeatInfo"></h3>
<input type="password" id="adminPassword" placeholder="Hasło">
<button onclick="deleteSeat()">USUŃ</button>
</div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyCgNJ5Ex6z0_aeqvwjDzwjTMQuTvqwdwVA",
authDomain: "salarezerwacji.firebaseapp.com",
databaseURL: "https://salarezerwacji-default-rtdb.firebaseio.com",
projectId: "salarezerwacji"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const hall = document.getElementById("hall");
let selectedSeats=[];

// TWORZENIE SALI
for(let row=1; row<=20; row++){
    const rowDiv=document.createElement("div");
    rowDiv.classList.add("row");

    const label=document.createElement("div");
    label.classList.add("row-label");
    label.innerText=row;
    rowDiv.appendChild(label);

    let seats=row===1?26:(row===20?14:28);

    for(let i=1;i<=seats;i++){
        if(row!==20 && (i===8 || i===22)){
            const gap=document.createElement("div");
            gap.classList.add("gap");
            rowDiv.appendChild(gap);
        }

        const id=`R${row}M${i}`;
        const btn=document.createElement("div");
        btn.classList.add("seat");
        btn.innerText=i;

        btn.onclick=()=>{
            if(btn.classList.contains("occupied")){
                openAdmin(id,btn.dataset.name);
                return;
            }
            btn.classList.toggle("selected");
            selectedSeats.includes(id)
                ? selectedSeats=selectedSeats.filter(s=>s!==id)
                : selectedSeats.push(id);

            document.getElementById("selectedCount").innerText=
                "Wybrane miejsca: "+selectedSeats.length;
        };

        btn.id=id;
        rowDiv.appendChild(btn);
    }

    hall.appendChild(rowDiv);
}

// ZAPIS
function saveSeats(){
    const name=document.getElementById("modalName").value;
    selectedSeats.forEach(id=>{
        db.ref("seats/"+id).set({name});
    });
    selectedSeats=[];
    location.reload();
}

// LOAD
db.ref("seats").on("value",snap=>{
    const data=snap.val()||{};
    Object.keys(data).forEach(id=>{
        const el=document.getElementById(id);
        if(el){
            el.classList.add("occupied");
            el.dataset.name=data[id].name;
        }
    });
});

// ADMIN
const ADMIN_PASSWORD="tajnehaslo";
let currentSeat=null;

function openAdmin(id,name){
    currentSeat=id;
    document.getElementById("adminSeatInfo").innerText=name;
    document.getElementById("adminModal").style.display="flex";
}

function deleteSeat(){
    if(document.getElementById("adminPassword").value!==ADMIN_PASSWORD){
        alert("Złe hasło");
        return;
    }
    db.ref("seats/"+currentSeat).remove();
    location.reload();
}

// REZERWACJA
document.getElementById("reserveBtn").onclick=()=>{
    if(!selectedSeats.length) return alert("Wybierz miejsca");
    document.getElementById("modal").style.display="flex";
};

// SZUKAJ
function searchPerson(){
    const s=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".seat").forEach(b=>{
        b.classList.remove("highlight");
        if(b.dataset.name && b.dataset.name.toLowerCase().includes(s))
            b.classList.add("highlight");
    });
}
</script>

</body>
</html>
