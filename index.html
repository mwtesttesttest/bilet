<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }

/* TOP */
.top-bar {
    margin:20px;
    display:flex;
    justify-content:center;
    gap:10px;
}

/* SCENA */
.stage {
    width:min(800px,95vw);
    height:40px;
    background:#d2a679;
    margin:10px auto;
}

/* SALA */
#hall-container {
    overflow-x:auto;
    display:flex;
    justify-content:center;
}
#hall { display:flex; flex-direction:column; align-items:center; min-width:max-content; }
.row { display:flex; margin:4px 0; }

/* FOTELE */
.seat {
    width:34px;
    aspect-ratio:1/1.2;
    margin:3px;
    background:linear-gradient(#5cb85c,#3c763d);
    border-radius:8px 8px 4px 4px;
    border-bottom:4px solid #2e6d2f;
    color:white;
    font-size:11px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.1s;
}
.seat:hover { transform:scale(1.1); }
.selected { background:orange; }
.occupied { background:gray; cursor:not-allowed; }

.gap { width:15px; }
.big-gap { height:25px; }

/* LICZNIKI */
#stats { text-align:center; margin-top:10px; }

/* BUTTON */
#reserveBtn {
    display:block;
    margin:20px auto;
    padding:12px 25px;
}

/* MODALE */
.modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}
.box {
    background:white;
    padding:20px;
    border-radius:10px;
    width:90%;
    max-width:400px;
}

/* PANEL ADMINA */
#adminPanel {
    position:fixed;
    right:-400px;
    top:0;
    width:400px;
    height:100%;
    background:white;
    box-shadow:-5px 0 15px rgba(0,0,0,0.3);
    padding:20px;
    overflow:auto;
    transition:0.3s;
}
#adminPanel.open { right:0; }

table {
    width:100%;
    border-collapse:collapse;
}
td,th {
    border-bottom:1px solid #ddd;
    padding:5px;
    text-align:center;
}
</style>
</head>

<body>

<div class="top-bar">
<input id="search" placeholder="Szukaj">
<button onclick="searchPerson()">Szukaj</button>
<button onclick="openAdminLogin()">PANEL ADMINA</button>
</div>

<div class="stage"></div>

<div id="hall-container">
<div id="hall"></div>
</div>

<div id="stats"></div>
<button id="reserveBtn">ZAREZERWUJ</button>

<!-- REZERWACJA -->
<div id="modal" class="modal">
<div class="box">
<h3>Imię i nazwisko</h3>
<input id="name">
<br><br>
<button onclick="save()">ZAPISZ</button>
<button onclick="closeModal()">ANULUJ</button>
</div>
</div>

<!-- LOGIN ADMIN -->
<div id="adminLogin" class="modal">
<div class="box">
<h3>Hasło admina</h3>
<input id="adminPass" type="password">
<br><br>
<button onclick="loginAdmin()">WEJDŹ</button>
</div>
</div>

<!-- PANEL -->
<div id="adminPanel">
<h3>Panel admina</h3>
<div id="adminStats"></div>
<br>
<table>
<thead>
<tr>
<th>Osoba</th>
<th>Rząd</th>
<th>M</th>
<th></th>
</tr>
</thead>
<tbody id="adminTable"></tbody>
</table>
</div>

<script>
const ADMIN_PASSWORD="1234";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSy...",
  databaseURL: "https://salarezerwacji-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let selected=[];

/* TWORZENIE SALI */
for(let r=1;r<=20;r++){
let row=document.createElement("div");
row.className="row";

let seats=r==1?26:(r==20?14:28);

for(let i=1;i<=seats;i++){

if(r!==20){
if((r==1&&(i==7||i==21))||(r!==1&&(i==8||i==22))){
let g=document.createElement("div");
g.className="gap";
row.appendChild(g);
}
}

let b=document.createElement("div");
b.className="seat";
b.innerText=i;
b.id=`R${r}M${i}`;

b.onclick=()=>clickSeat(b);

row.appendChild(b);
}

hall.appendChild(row);

if(r==10){
let g=document.createElement("div");
g.className="big-gap";
hall.appendChild(g);
}
}

/* KLIK */
function clickSeat(b){
if(b.classList.contains("occupied")) return;

b.classList.toggle("selected");

if(selected.includes(b.id))
selected=selected.filter(x=>x!==b.id);
else selected.push(b.id);
}

/* MODAL */
function openModal(){
if(!selected.length) return alert("Wybierz miejsce");
modal.style.display="flex";
}
reserveBtn.onclick=openModal;

function closeModal(){ modal.style.display="none"; }

/* ZAPIS */
function save(){
let name=document.getElementById("name").value;
selected.forEach(id=>{
db.ref("seats/"+id).set({name});
generatePDF(name,id);
});
selected=[];
closeModal();
}

/* PDF */
function generatePDF(name,id){
const {jsPDF}=window.jspdf;
let pdf=new jsPDF();
pdf.text("BILET",10,10);
pdf.text(name,10,20);
pdf.text(id,10,30);
pdf.save("bilet_"+id+".pdf");
}

/* FIREBASE LOAD */
db.ref("seats").on("value",snap=>{
let data=snap.val()||{};
document.querySelectorAll(".seat").forEach(b=>{
b.classList.remove("occupied");
});

Object.keys(data).forEach(id=>{
let b=document.getElementById(id);
if(b){
b.classList.add("occupied");
b.dataset.name=data[id].name;
}
});

updateStats(data);
updateAdmin(data);
});

/* STATS */
function updateStats(data){
let occ=Object.keys(data).length;
let all=document.querySelectorAll(".seat").length;
let free=all-occ;

stats.innerText=`Wolne: ${free} | Zajęte: ${occ}`;
}

/* ADMIN */
function openAdminLogin(){
adminLogin.style.display="flex";
}

function loginAdmin(){
if(adminPass.value===ADMIN_PASSWORD){
adminLogin.style.display="none";
adminPanel.classList.add("open");
}else alert("Złe hasło");
}

/* TABELA */
function updateAdmin(data){
let html="";
Object.keys(data).forEach(id=>{
let r=id.match(/R(\d+)/)[1];
let m=id.match(/M(\d+)/)[1];
html+=`
<tr>
<td>${data[id].name}</td>
<td>${r}</td>
<td>${m}</td>
<td><button onclick="removeSeat('${id}')">❌</button></td>
</tr>`;
});
adminTable.innerHTML=html;
}

/* USUWANIE */
function removeSeat(id){
if(!confirm("Usunąć?")) return;
db.ref("seats/"+id).remove();
}

/* SZUKAJ */
function searchPerson(){
let s=search.value.toLowerCase();
document.querySelectorAll(".seat").forEach(b=>{
b.style.outline="";
if(b.dataset.name && b.dataset.name.toLowerCase().includes(s))
b.style.outline="3px solid yellow";
});
}
</script>

</body>
</html>
