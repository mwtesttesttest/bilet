<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sala rezerwacji PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<!-- PDF LIB -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }
.row { display:flex; justify-content:center; margin:4px 0; }
.seat {
    width:30px;height:30px;margin:3px;
    background:green;color:white;border:none;
    cursor:pointer;
}
.selected { background:orange; }
.occupied { background:gray; cursor:not-allowed; }
</style>
</head>
<body>

<div id="hall"></div>
<button id="reserveBtn">ZAREZERWUJ</button>

<div id="modal" style="display:none;">
    <input type="text" id="modalName" placeholder="Imię i nazwisko">
    <button id="saveModal">ZAPISZ</button>
</div>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIza...",
  databaseURL: "https://salarezerwacji-default-rtdb.firebaseio.com",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const hall = document.getElementById("hall");
let selectedSeats = [];

// SALA
for(let row=1; row<=5; row++){
    const rowDiv=document.createElement("div");
    rowDiv.classList.add("row");

    for(let i=1;i<=10;i++){
        const id=`R${row}M${i}`;
        const btn=document.createElement("button");

        btn.className="seat";
        btn.innerText=i;

        btn.onclick=()=>{
            if(btn.classList.contains("occupied")) return;
            btn.classList.toggle("selected");

            if(selectedSeats.includes(id))
                selectedSeats=selectedSeats.filter(s=>s!==id);
            else
                selectedSeats.push(id);
        };

        btn.id=id;
        rowDiv.appendChild(btn);
    }

    hall.appendChild(rowDiv);
}

// 🔥 IDEALNIE DOPASOWANY PDF
async function generujBiletPDF(name, seatId){

    const existingPdfBytes = await fetch("bilet.pdf").then(res => res.arrayBuffer());
    const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
    const page = pdfDoc.getPages()[0];

    const font = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);

    const row = seatId.match(/R(\d+)/)[1];
    const seat = seatId.match(/M(\d+)/)[1];

    // 📐 ROZMIAR PDF: ~482 x 156

    // ✅ IMIĘ (lewa część biletu)
    page.drawText(name, {
        x: 40,
        y: 60,
        size: 12,
        font: font
    });

    // ✅ RZĄD (białe pole - prawa część)
    page.drawText(row, {
        x: 360,
        y: 70,
        size: 18,
        font: font
    });

    // ✅ MIEJSCE (białe pole - obok)
    page.drawText(seat, {
        x: 420,
        y: 70,
        size: 18,
        font: font
    });

    const pdfBytes = await pdfDoc.save();

    const blob = new Blob([pdfBytes], { type: "application/pdf" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `Bilet_${seatId}.pdf`;
    link.click();
}

// REZERWACJA
document.getElementById("reserveBtn").onclick=()=>{
    if(!selectedSeats.length) return alert("Wybierz miejsce");
    document.getElementById("modal").style.display="block";
};

document.getElementById("saveModal").onclick=()=>{
    const name=document.getElementById("modalName").value.trim();
    if(!name) return alert("Podaj imię");

    selectedSeats.forEach(id=>{
        const btn=document.getElementById(id);

        btn.classList.remove("selected");
        btn.classList.add("occupied");

        db.ref('seats/'+id).set({name:name,occupied:true});

        generujBiletPDF(name, id);
    });

    selectedSeats=[];
    document.getElementById("modal").style.display="none";
};

</script>
</body>
</html>
