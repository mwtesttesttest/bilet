<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }

/* top bar */
.top-bar {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
}

/* 🔥 ulepszone input */
input {
    padding: 8px 12px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
}
input:focus {
    border-color: #4caf50;
    box-shadow: 0 0 8px rgba(76,175,80,0.5);
}

/* 🔥 ulepszony button */
.top-bar button {
    border-radius: 20px;
    background:#4caf50;
    color:white;
    border:none;
    padding: 8px 15px;
    cursor:pointer;
}

button { padding: 5px 10px; cursor: pointer; }

.stage {
    position: relative;
    width: min(800px, 95vw);
    height: 40px;
    background-color: #d2a679;
    margin: 10px auto 20px auto;
}

#hall-container {
    width: 100%;
    overflow-x: auto;
    display: flex;
    justify-content: center;
}
#hall {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: max-content;
}
.row { display: flex; justify-content: center; margin: 4px 0; }

.seat {
    width: min(36px,4vw);
    aspect-ratio: 1 / 1.2;
    margin: min(3px,0.5vw);
    background: linear-gradient(to top, #3c763d 0%, #5cb85c 60%, #4cae4c 100%);
    border-radius: 8px 8px 4px 4px;
    border-bottom: 4px solid #2e6d2f;
    color: white;
    font-size: min(12px,1.5vw);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}

.selected { background: orange; }
.occupied { background: gray; cursor: not-allowed; }
.highlight { outline: 3px solid yellow; }

.gap { width: min(15px,2vw); }
.big-gap { height: min(25px,3vw); }

#selectedCount, #freeCount, #occupiedCount {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
}

#reserveBtn { display: block; margin: 20px auto; padding: 12px 25px; }

#modal, #adminModal, #adminListModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 200;
}

.modalContent {
    background: #f9f9f9;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 450px;
}

/* 🔥 admin button */
#adminPanelBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 300;
}
</style>
</head>
<body>

<div class="top-bar">
    🔍 <input type="text" id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<!-- 🔥 ADMIN BUTTON -->
<button id="adminPanelBtn">⚙️</button>

<div class="stage"></div>

<div id="hall-container">
    <div id="hall"></div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>
<div id="seatCounts">
    <div id="freeCount">Wolne miejsca: 0</div>
    <div id="occupiedCount">Zajęte miejsca: 0</div>
</div>

<button id="reserveBtn">ZAREZERWUJ</button>

<!-- MODALE -->
<div id="modal">
    <div class="modalContent">
        <input type="text" id="modalName">
        <button id="saveModal">ZAPISZ</button>
    </div>
</div>

<div id="adminListModal">
    <div class="modalContent">
        <input type="password" id="adminListPassword">
        <div id="adminListContent"></div>
        <button id="adminListClose">ZAMKNIJ</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey:"x", databaseURL:"x" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const hall = document.getElementById("hall");
let selectedSeats = [];

for(let row=1; row<=20; row++){
    const rowDiv=document.createElement("div");
    rowDiv.classList.add("row");

    for(let i=1;i<=20;i++){
        const id=`R${row}M${i}`;
        const btn=document.createElement("button");
        btn.classList.add("seat");
        btn.innerText=i;

        btn.onclick=()=>{
            btn.classList.toggle("selected");
            selectedSeats.push(id);
        }

        rowDiv.appendChild(btn);
    }

    /* 🔥 NUMER RZĘDU */
    const wrapper=document.createElement("div");
    wrapper.style.display="flex";
    wrapper.appendChild(rowDiv);

    const label=document.createElement("div");
    label.innerText=row;
    label.style.marginLeft="5px";
    wrapper.appendChild(label);

    hall.appendChild(wrapper);
}

/* 🔥 ADMIN PANEL */
document.getElementById("adminPanelBtn").onclick=()=>{
    document.getElementById("adminListModal").style.display="flex";
};

document.getElementById("adminListPassword").onchange=()=>{
    if(this.value!=="tajnehaslo") return alert("zle haslo");

    db.ref("seats").once("value",snap=>{
        const data=snap.val()||{};
        const box=document.getElementById("adminListContent");
        box.innerHTML="";

        Object.keys(data).forEach(id=>{
            const d=data[id];

            const el=document.createElement("div");
            el.innerHTML=`${d.name} ${id} <button onclick="db.ref('seats/${id}').remove()">X</button>`;
            box.appendChild(el);
        });
    });
};

/* 🔥 PDF (ładniejsza czcionka) */
async function generujWszystkieBiletyPDF(name,seats){
    const pdf=await PDFLib.PDFDocument.create();
    const font=await pdf.embedFont(PDFLib.StandardFonts.Helvetica);

    seats.forEach(s=>{
        const page=pdf.addPage();
        page.drawText(name,{x:100,y:200,size:10,font});
    });

    const bytes=await pdf.save();
    const link=document.createElement("a");
    link.href=URL.createObjectURL(new Blob([bytes]));
    link.download="bilety.pdf";
    link.click();
}
</script>

</body>
</html>
