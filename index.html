<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- 🔥 TYLKO TO DODANE -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
/* TWÓJ CSS 1:1 */
body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }
.top-bar { margin: 20px 0; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
input { padding: 5px; min-width: 100px; }
button { padding: 5px 10px; cursor: pointer; }
.stage { position: relative; width: min(800px, 95vw); height: 40px; background-color: #d2a679; margin: 10px auto 20px auto; }
#hall-container { width: 100%; overflow-x: auto; display: flex; justify-content: center; }
#hall { display: flex; flex-direction: column; align-items: center; min-width: max-content; }
.row { display: flex; justify-content: center; margin: 4px 0; }
.seat {
    width: min(36px,4vw);
    aspect-ratio: 1 / 1.2;
    margin: min(3px,0.5vw);
    background: linear-gradient(to top, #3c763d 0%, #5cb85c 60%, #4cae4c 100%);
    border-radius: 8px 8px 4px 4px;
    border-bottom: 4px solid #2e6d2f;
    color: white;
    font-size: min(12px,1.5vw);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}
.seat:hover { transform: scale(1.1); }
.selected { background: orange; }
.occupied { background: gray; cursor: not-allowed; }
.highlight { outline: 3px solid yellow; }
.gap { width: min(15px,2vw); }
.big-gap { height: min(25px,3vw); }
#selectedCount, #freeCount, #occupiedCount { margin-top: 10px; text-align: center; font-weight: bold; }
#reserveBtn { display: block; margin: 20px auto; padding: 12px 25px; font-size: 16px; }
#modal, #adminModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}
.modalContent { background: #fff; padding: 20px; border-radius: 10px; }
#seatCounts { display:flex; justify-content:center; gap:15px; }
</style>
</head>
<body>

<div class="top-bar">
<input type="text" id="search">
<button onclick="searchPerson()">Szukaj</button>
</div>

<div class="stage"></div>

<div id="hall-container"><div id="hall"></div></div>

<div id="selectedCount">Wybrane miejsca: 0</div>
<div id="seatCounts">
<div id="freeCount">Wolne miejsca: 0</div>
<div id="occupiedCount">Zajęte miejsca: 0</div>
</div>

<button id="reserveBtn">ZAREZERWUJ</button>

<div id="modal">
<div class="modalContent">
<input type="text" id="modalName">
<button id="saveModal">ZAPISZ</button>
</div>
</div>

<script>

// Firebase
const firebaseConfig = { apiKey:"AIza...", databaseURL:"https://salarezerwacji-default-rtdb.firebaseio.com"};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const hall = document.getElementById("hall");
let selectedSeats = [];

// SALA (ORYGINAŁ)
for(let row=1; row<=20; row++){
    const rowDiv=document.createElement("div");
    rowDiv.classList.add("row");
    let seats=row===1?26:(row===20?14:28);

    for(let i=1;i<=seats;i++){
        const seatId=`R${row}M${i}`;
        const btn=document.createElement("button");

        btn.classList.add("seat");
        btn.id=seatId;
        btn.innerText=i;

        btn.onclick=()=>{
            if(btn.classList.contains("occupied")) return;
            btn.classList.toggle("selected");

            if(selectedSeats.includes(seatId))
                selectedSeats=selectedSeats.filter(s=>s!==seatId);
            else
                selectedSeats.push(seatId);
        };

        rowDiv.appendChild(btn);
    }

    hall.appendChild(rowDiv);
}

// 🔥 NOWA FUNKCJA (TYLKO DODANA)
async function generujBiletPDF(name,id){
    const bytes = await fetch("bilet.pdf").then(r=>r.arrayBuffer());
    const pdf = await PDFLib.PDFDocument.load(bytes);
    const page = pdf.getPages()[0];
    const font = await pdf.embedFont(PDFLib.StandardFonts.HelveticaBold);

    const row = id.match(/R(\d+)/)[1];
    const seat = id.match(/M(\d+)/)[1];

    page.drawText(name,{x:45,y:55,size:12,font});
    page.drawText(row,{x:360,y:72,size:18,font});
    page.drawText(seat,{x:420,y:72,size:18,font});

    const out = await pdf.save();
    const blob = new Blob([out],{type:"application/pdf"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`Bilet_${id}.pdf`;
    a.click();
}

// REZERWACJA (ORYGINAŁ + JEDNA LINIA)
document.getElementById("saveModal").onclick=()=>{
    const name=document.getElementById("modalName").value;
    selectedSeats.forEach(id=>{
        const btn=document.getElementById(id);
        btn.classList.add("occupied");

        db.ref('seats/'+id).set({name});

        // 🔥 TYLKO TO ZAMIENIONE
        generujBiletPDF(name,id);
    });
};

</script>
</body>
</html>
